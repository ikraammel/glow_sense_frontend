server:
  port: 8080

resend:
  api-key: ${RESEND_API_KEY}

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartskin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

groq:
  api-key: ${GROQ_API_KEY}

app:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8081

logging:
  level:
    com.smart_skin: DEBUG
    org.springframework.security: WARN