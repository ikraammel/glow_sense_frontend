name: glowsense_app
description: GlowSense AI - Application de soin cutané intelligente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.4.0
  camera: ^0.12.0+1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_native_splash: ^2.4.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/glow_sense_logo.png
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/glow_sense_logo.png"